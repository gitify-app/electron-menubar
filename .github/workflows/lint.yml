name: Linting

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: package.json
            - run: bun install --frozen-lockfile
            - run: bun run lint:check
