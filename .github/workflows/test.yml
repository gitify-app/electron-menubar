name: Run Tests

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    lint:
        name: Run Tests
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: package.json
            - run: bun install --frozen-lockfile
            - run: bun run test
