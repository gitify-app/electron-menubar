name: Visual Tray

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions: {}

jobs:
    macos:
        name: Visual [${{ matrix.label }}]
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-26
                      label: macOS 26 (Tahoe)
                      key: macos-26
                    - runner: macos-15
                      label: macOS 15 (Sequoia)
                      key: macos-15
                    - runner: macos-14
                      label: macOS 14 (Sonoma)
                      key: macos-14
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json
            - name: Install dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun install --frozen-lockfile; then exit 0; fi
                      echo "::warning::install attempt $attempt failed; retrying..."
                      sleep $((attempt * 5))
                  done
                  exit 1
            - name: Build library
              run: bun run build
            - name: Run visual test
              env:
                  VISUAL_KEY: ${{ matrix.key }}
                  VISUAL_LABEL: ${{ matrix.label }}
              run: bun run test:visual
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: visual-${{ matrix.key }}
                  path: test-results/visual/
                  if-no-files-found: warn
                  retention-days: 14

    linux:
        name: Visual [${{ matrix.label }}]
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        continue-on-error: ${{ matrix.experimental || false }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - de: mate
                      label: Linux (MATE)
                      key: linux-mate
                      apt: mate-panel mate-indicator-applet
                      panel_cmd: mate-panel --replace
                    - de: xfce
                      label: Linux (Xfce)
                      key: linux-xfce
                      apt: xfce4-panel
                      panel_cmd: xfce4-panel --disable-wm-check
                    - de: lxqt
                      label: Linux (LXQt)
                      key: linux-lxqt
                      apt: lxqt-panel lxqt-session
                      panel_cmd: lxqt-panel
                    - de: kde
                      label: Linux (KDE Plasma)
                      key: linux-kde
                      apt: plasma-workspace kwin-x11
                      panel_cmd: plasmashell --no-respawn
                      experimental: true
                    - de: cinnamon
                      label: Linux (Cinnamon)
                      key: linux-cinnamon
                      apt: cinnamon-core
                      panel_cmd: cinnamon --replace
                      experimental: true
                    - de: tint2
                      label: Linux (Tint2)
                      key: linux-tint2
                      apt: tint2
                      panel_cmd: tint2
                      experimental: true
                    - de: gnome
                      label: Linux (GNOME)
                      key: linux-gnome
                      apt: gnome-shell gnome-shell-extension-appindicator
                      panel_cmd: gnome-shell --x11
                      experimental: true
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json
            - name: Install dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun install --frozen-lockfile; then exit 0; fi
                      echo "::warning::install attempt $attempt failed; retrying..."
                      sleep $((attempt * 5))
                  done
                  exit 1
            - name: Build library
              run: bun run build
            - name: Install desktop environment
              env:
                  APT_PACKAGES: ${{ matrix.apt }}
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                      xvfb imagemagick dbus-x11 \
                      libgtk-3-0 libnss3 libxss1 libasound2t64 \
                      libgbm1 libatk-bridge2.0-0 libdrm2 \
                      libxtst6 libnotify4 libxrandr2 \
                      libxcomposite1 libxdamage1 libxfixes3 libcups2 \
                      libayatana-appindicator3-1 \
                      $APT_PACKAGES
            - name: Run visual test under ${{ matrix.de }}
              env:
                  VISUAL_KEY: ${{ matrix.key }}
                  VISUAL_LABEL: ${{ matrix.label }}
                  PANEL_CMD: ${{ matrix.panel_cmd }}
              run: |
                  set -x
                  Xvfb :99 -screen 0 1920x1080x24 &
                  XVFB_PID=$!
                  export DISPLAY=:99
                  sleep 2
                  dbus-run-session -- bash -c '
                      eval "$PANEL_CMD" &
                      PANEL_PID=$!
                      sleep 8
                      bun run test:visual
                      EXIT=$?
                      kill $PANEL_PID 2>/dev/null || true
                      exit $EXIT
                  '
                  EXIT=$?
                  kill $XVFB_PID 2>/dev/null || true
                  exit $EXIT
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: visual-${{ matrix.key }}
                  path: test-results/visual/
                  if-no-files-found: warn
                  retention-days: 14

    windows:
        name: Visual [${{ matrix.label }}]
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: windows-2025
                      label: Windows Server 2025
                      key: windows-2025
                    - runner: windows-2022
                      label: Windows Server 2022
                      key: windows-2022
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json
            - name: Install dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun install --frozen-lockfile; then exit 0; fi
                      echo "::warning::install attempt $attempt failed; retrying..."
                      sleep $((attempt * 5))
                  done
                  exit 1
            - name: Build library
              run: bun run build
            - name: Disable tray icon auto-hide
              shell: pwsh
              run: |
                  $key = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer'
                  New-Item -Path $key -Force | Out-Null
                  Set-ItemProperty -Path $key -Name 'EnableAutoTray' -Value 0 -Type DWord
                  Stop-Process -Name explorer -Force
                  Start-Process explorer
                  Start-Sleep -Seconds 5
            - name: Run visual test
              env:
                  VISUAL_KEY: ${{ matrix.key }}
                  VISUAL_LABEL: ${{ matrix.label }}
              run: bun run test:visual
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: visual-${{ matrix.key }}
                  path: test-results/visual/
                  if-no-files-found: warn
                  retention-days: 14
