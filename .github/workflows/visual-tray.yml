name: Visual Tray

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions: {}

jobs:
    macos:
        name: Visual [${{ matrix.label }}]
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-26
                      label: macOS 26 (Tahoe)
                      key: macos-26
                    - runner: macos-15
                      label: macOS 15 (Sequoia)
                      key: macos-15
                    - runner: macos-14
                      label: macOS 14 (Sonoma)
                      key: macos-14
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json
            - name: Install dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun install --frozen-lockfile; then exit 0; fi
                      echo "::warning::install attempt $attempt failed; retrying..."
                      sleep $((attempt * 5))
                  done
                  exit 1
            - name: Build library
              run: bun run build
            - name: Run visual test
              env:
                  VISUAL_KEY: ${{ matrix.key }}
                  VISUAL_LABEL: ${{ matrix.label }}
              run: bun run test:visual
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: visual-${{ matrix.key }}
                  path: test-results/visual/
                  if-no-files-found: warn
                  retention-days: 14

    linux:
        name: Visual [${{ matrix.label }}]
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        continue-on-error: ${{ matrix.experimental || false }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - de: mate
                      label: Linux (MATE)
                      key: linux-mate
                      apt: mate-panel mate-indicator-applet
                      panel_cmd: mate-panel --replace
                    - de: xfce
                      label: Linux (Xfce)
                      key: linux-xfce
                      apt: xfce4-panel
                      panel_cmd: xfce4-panel --disable-wm-check
                    - de: lxqt
                      label: Linux (LXQt)
                      key: linux-lxqt
                      apt: lxqt-panel lxqt-session
                      panel_cmd: |
                          mkdir -p ~/.config/lxqt && \
                          printf '[General]\n__userfile__=true\npanels=p1\n[p1]\nplugins=statusnotifier\nposition=Top\nalignment=0\n[statusnotifier]\ntype=statusnotifier\nalignment=Right\n' > ~/.config/lxqt/panel.conf && \
                          lxqt-panel
                    - de: kde
                      label: Linux (KDE Plasma)
                      key: linux-kde
                      apt: plasma-workspace plasma-desktop kwin-x11 systemsettings kde-cli-tools
                      panel_cmd: |
                          bash -c '
                          kwin_x11 --replace & sleep 4
                          plasmashell --no-respawn & PLASMA_PID=$!
                          sleep 12
                          CFG=~/.config/plasma-org.kde.plasma.desktop-appletsrc
                          # Extract containment id whose plugin is the private systemtray
                          SYS_CID=$(awk "
                            /^\\[Containments\\]\\[[0-9]+\\]\$/ {
                              match(\$0, /[0-9]+/); cid = substr(\$0, RSTART, RLENGTH)
                            }
                            /^plugin=org\\.kde\\.plasma\\.private\\.systemtray\$/ {
                              print cid; exit
                            }" "$CFG")
                          echo "=== systemtray containment id: $SYS_CID ==="
                          if [ -n "$SYS_CID" ]; then
                            kwriteconfig5 --file "$CFG" --group Containments --group "$SYS_CID" --group General --key extraItems "menubar-visual-fixture,electron,Electron"
                            kwriteconfig5 --file "$CFG" --group Containments --group "$SYS_CID" --group General --key shownItems "menubar-visual-fixture,electron,Electron"
                            # Try the systemtray applet variant (defaultStatus=Active = always shown)
                            kwriteconfig5 --file "$CFG" --group Containments --group "$SYS_CID" --group General --key defaultStatus 2
                          fi
                          echo "=== plasma config after rewrite ==="; cat "$CFG"
                          kquitapp5 plasmashell 2>/dev/null || pkill -f plasmashell
                          sleep 3
                          plasmashell --no-respawn & sleep 8
                          wait'
                      panel_warmup: 35
                      post_ready_delay: 18000
                      experimental: true
                    - de: cinnamon
                      label: Linux (Cinnamon)
                      key: linux-cinnamon
                      apt: cinnamon cinnamon-session muffin mesa-utils xserver-xephyr x11-xserver-utils
                      panel_cmd: |
                          bash -c '
                          export LIBGL_ALWAYS_SOFTWARE=1 GALLIUM_DRIVER=llvmpipe MESA_GL_VERSION_OVERRIDE=3.3 CLUTTER_BACKEND=x11
                          # Run Cinnamon inside Xephyr (a real X server) since Xvfb RandR is broken
                          Xephyr -screen 1920x1080 -ac -br -noreset :100 &
                          sleep 3
                          export DISPLAY=:100
                          xrandr --query
                          muffin --replace --x11 & sleep 4
                          cinnamon --replace'
                      panel_warmup: 25
                      post_ready_delay: 14000
                      experimental: true
                    - de: tint2
                      label: Linux (Tint2)
                      key: linux-tint2
                      apt: tint2 valac libgtk-3-dev libdbusmenu-glib-dev libdbusmenu-gtk3-dev pkg-config make git
                      panel_cmd: bash -c 'tint2 & sleep 3; snixembed'
                      build_snixembed: true
                      panel_warmup: 12
                      post_ready_delay: 6000
                    - de: gnome
                      label: Linux (GNOME)
                      key: linux-gnome
                      apt: gnome-shell gnome-shell-extension-appindicator
                      panel_cmd: bash -c 'gnome-extensions enable ubuntu-appindicators@ubuntu.com 2>/dev/null || true; gnome-shell --x11'
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json
            - name: Install dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun install --frozen-lockfile; then exit 0; fi
                      echo "::warning::install attempt $attempt failed; retrying..."
                      sleep $((attempt * 5))
                  done
                  exit 1
            - name: Build library
              run: bun run build
            - name: Install desktop environment
              env:
                  APT_PACKAGES: ${{ matrix.apt }}
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                      xvfb imagemagick dbus-x11 \
                      libgtk-3-0 libnss3 libxss1 libasound2t64 \
                      libgbm1 libatk-bridge2.0-0 libdrm2 \
                      libxtst6 libnotify4 libxrandr2 \
                      libxcomposite1 libxdamage1 libxfixes3 libcups2 \
                      libayatana-appindicator3-1 \
                      $APT_PACKAGES
            - name: Build snixembed (SNI to XEmbed bridge)
              if: matrix.build_snixembed
              run: |
                  git clone --depth 1 https://git.sr.ht/~steef/snixembed /tmp/snixembed
                  cd /tmp/snixembed
                  make
                  sudo make install PREFIX=/usr/local
                  snixembed --help 2>&1 | head -5 || true
            - name: Run visual test under ${{ matrix.de }}
              env:
                  VISUAL_KEY: ${{ matrix.key }}
                  VISUAL_LABEL: ${{ matrix.label }}
                  VISUAL_POST_READY_DELAY_MS: ${{ matrix.post_ready_delay || 3000 }}
                  PANEL_CMD: ${{ matrix.panel_cmd }}
                  PANEL_WARMUP: ${{ matrix.panel_warmup || 8 }}
              run: |
                  set -x
                  Xvfb :99 -screen 0 ${{ matrix.xvfb_screen || '1920x1080x24' }} &
                  XVFB_PID=$!
                  export DISPLAY=:99
                  sleep 2
                  dbus-run-session -- bash -c '
                      export DISPLAY=:99
                      eval "$PANEL_CMD" &
                      PANEL_PID=$!
                      sleep "$PANEL_WARMUP"
                      bun run test:visual
                      EXIT=$?
                      kill $PANEL_PID 2>/dev/null || true
                      exit $EXIT
                  '
                  EXIT=$?
                  kill $XVFB_PID 2>/dev/null || true
                  exit $EXIT
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: visual-${{ matrix.key }}
                  path: test-results/visual/
                  if-no-files-found: warn
                  retention-days: 14

    windows:
        name: Visual [${{ matrix.label }}]
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
        continue-on-error: ${{ matrix.experimental || false }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: windows-2022
                      label: Windows Server 2022
                      key: windows-2022
                    - runner: windows-2025
                      label: Windows Server 2025
                      key: windows-2025
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json
            - name: Install dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun install --frozen-lockfile; then exit 0; fi
                      echo "::warning::install attempt $attempt failed; retrying..."
                      sleep $((attempt * 5))
                  done
                  exit 1
            - name: Build library
              run: bun run build
            - name: Set EnableAutoTray=0 (legacy Win10/2022 path, best-effort)
              shell: pwsh
              continue-on-error: true
              run: |
                  Set-ItemProperty -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer' -Name 'EnableAutoTray' -Value 0 -Type DWord -ErrorAction SilentlyContinue
                  taskkill /F /IM explorer.exe 2>$null; Start-Process explorer; Start-Sleep -Seconds 5
            - name: Run visual test
              env:
                  VISUAL_KEY: ${{ matrix.key }}
                  VISUAL_LABEL: ${{ matrix.label }}
                  VISUAL_PREPARE_CMD: |
                      Get-ChildItem 'HKCU:\Control Panel\NotifyIconSettings' -ErrorAction SilentlyContinue | ForEach-Object { Set-ItemProperty -Path $_.PSPath -Name IsPromoted -Value 1 -Type DWord -Force };
                      Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue;
                      Start-Process explorer;
                      Start-Sleep -Seconds 6
              run: bun run test:visual
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: visual-${{ matrix.key }}
                  path: test-results/visual/
                  if-no-files-found: warn
                  retention-days: 14
